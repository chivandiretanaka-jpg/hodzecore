<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hodzecore — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    h1 {
      color: #38bdf8;
      font-size: 1.8rem;
      margin-bottom: 4px;
    }
    .tagline {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus {
      border-color: #38bdf8;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }
    button:hover { background: #7dd3fc; }
    .error {
      display: none;
      color: #f87171;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Hodzecore</h1>
  <p class="tagline">AI-powered learning for Zimbabwean students</p>

  <label>Your name</label>
  <input type="text" id="nameInput" placeholder="Enter your full name" />

  <label>Grade</label>
  <input type="text" id="gradeInput" placeholder="e.g. Grade 7, Form 3" />

  <p class="error" id="error-msg">Please enter your name to continue.</p>

  <button onclick="login()">Enter Hodzecore</button>

  <div class="footer">Your progress is saved on this device.</div>
</div>

<script>
  function login() {
    const name = document.getElementById('nameInput').value.trim();
    const grade = document.getElementById('gradeInput').value.trim();
    const error = document.getElementById('error-msg');

    if (!name) {
      error.style.display = 'block';
      return;
    }

    localStorage.setItem('hc_name', name);
    localStorage.setItem('hc_grade', grade || 'Student');
    window.location.href = 'dashboard.html';
  }

  document.getElementById('nameInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });

  if (localStorage.getItem('hc_name')) {
    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>
