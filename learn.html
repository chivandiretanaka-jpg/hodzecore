<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hodzecore — Learn to Code</title>
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    header h1 { color: #38bdf8; font-size: 1.4rem; }
    header p { color: #94a3b8; font-size: 0.9rem; }
    .workspace { padding: 24px 32px; }
    .workspace h2 {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 16px;
      font-weight: normal;
    }
    #blocklyDiv {
      height: 420px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
    }
    #runBtn {
      background: #38bdf8;
      color: #0f172a;
    }
    #clearBtn {
      background: #334155;
      color: #f8fafc;
    }
    #output {
      margin-top: 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      min-height: 80px;
      font-family: monospace;
      font-size: 0.95rem;
      color: #4ade80;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Hodzecore</h1>
    <p>AI-powered learning for Zimbabwean students</p>
  </div>
  <a href="dashboard.html" style="color:#94a3b8; font-size:0.85rem; text-decoration:none;">← Back to Dashboard</a>
</header>

<div class="workspace">
  <h2>Drag blocks to build your program. Then click Run.</h2>
  <div id="blocklyDiv"></div>

  <div class="controls">
    <button id="runBtn" onclick="runCode()">▶ Run Code</button>
    <button id="clearBtn" onclick="clearOutput()">Clear</button>
  </div>

  <div id="output">Output will appear here...</div>
</div>

<xml id="toolbox" style="display:none">
  <category name="Logic" colour="#5C81A6">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
  </category>
  <category name="Loops" colour="#5BA55B">
    <block type="controls_repeat_ext"></block>
    <block type="controls_whileUntil"></block>
  </category>
  <category name="Math" colour="#5B67A5">
    <block type="math_number"></block>
    <block type="math_arithmetic"></block>
  </category>
  <category name="Text" colour="#5BA58C">
    <block type="text"></block>
    <block type="text_print"></block>
  </category>
  <category name="Variables" colour="#A55B5B" custom="VARIABLE"></category>
</xml>

<script>
  const workspace = Blockly.inject('blocklyDiv', {
    toolbox: document.getElementById('toolbox'),
    scrollbars: true,
    trashcan: true,
    theme: Blockly.Themes.Dark
  });

  function runCode() {
    const output = document.getElementById('output');
    const logs = [];
    const realLog = console.log;
    console.log = (...args) => logs.push(args.join(' '));
    try {
      const code = Blockly.JavaScript.javascriptGenerator
        ? Blockly.JavaScript.javascriptGenerator.workspaceToCode(workspace)
        : Blockly.JavaScript.workspaceToCode(workspace);
      eval(code);
      output.textContent = logs.length ? logs.join('\n') : 'Code ran. No output produced.';
    } catch(e) {
      output.textContent = 'Error: ' + e.message;
    }
    console.log = realLog;
  }

  function clearOutput() {
    document.getElementById('output').textContent = 'Output will appear here...';
  }
</script>

</body>
</html>
